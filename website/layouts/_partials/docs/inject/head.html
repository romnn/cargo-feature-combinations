{{- /* Resolve the effective color theme before first paint to avoid a flash. */ -}}
<script>
(function () {
  try {
    var stored = localStorage.getItem('cfc-theme');
    var mode = (stored === 'light' || stored === 'dark')
      ? stored
      : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', mode);
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();
</script>
<link rel="preload" href="{{ "fonts/geist-sans.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>
