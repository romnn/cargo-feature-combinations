name: pages
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      # The docs render these example workspaces' Cargo.toml verbatim and their
      # cargo-fc output as screenshots/terminal snippets.
      - "examples/**"
      - "src/**"
      - "scripts/screenshots.sh"
      - "scripts/terminals.sh"
      - "mise.toml"
      - "mise.lock"
      - "taskfile.yaml"
      - ".github/workflows/pages.yaml"
  workflow_dispatch: {}

# Allow the GITHUB_TOKEN to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # cargo-fc is built from source (docs render its live output); wasm32 is
      # needed for the multi-target example.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      # Everything else (go, extended Hugo, task, freeze, terminal-to-html, jq)
      # comes from mise.
      - uses: jdx/mise-action@v4
        env:
          MISE_GITHUB_TOKEN: ${{ github.token }}
        with:
          install: false
          cache: true
      - name: Install docs toolchain
        run: >-
          mise install
          go "asdf:NeoHsu/asdf-hugo" task
          "aqua:charmbracelet/freeze" "aqua:jqlang/jq"
          "go:github.com/buildkite/terminal-to-html/v3/cmd/terminal-to-html"
      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
      # Regenerates screenshots + terminal snippets from the current source, then
      # builds the site — the same `task docs:build` used locally.
      - name: Build docs
        run: mise exec -- task docs:build -- --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/public

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
